upstream round_robin_backend {
    server service1:3000;
    server service2:3000;
    server service3:3000;
}

upstream least_conn_backend {
    least_conn;
    server service1:3000;
    server service2:3000;
    server service3:3000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location = /api/round-robin/request {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-LB-Algorithm round-robin;
        proxy_pass http://round_robin_backend/api/request$is_args$args;
    }

    location = /api/least-conn/request {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-LB-Algorithm least-conn;
        proxy_pass http://least_conn_backend/api/request$is_args$args;
    }

    location = /api/backends/server-1/status {
        proxy_pass http://service1:3000/api/status;
    }

    location = /api/backends/server-1/reset {
        proxy_pass http://service1:3000/api/reset;
    }

    location = /api/backends/server-1/config {
        proxy_pass http://service1:3000/api/config;
    }

    location = /api/backends/server-2/status {
        proxy_pass http://service2:3000/api/status;
    }

    location = /api/backends/server-2/reset {
        proxy_pass http://service2:3000/api/reset;
    }

    location = /api/backends/server-2/config {
        proxy_pass http://service2:3000/api/config;
    }

    location = /api/backends/server-3/status {
        proxy_pass http://service3:3000/api/status;
    }

    location = /api/backends/server-3/reset {
        proxy_pass http://service3:3000/api/reset;
    }

    location = /api/backends/server-3/config {
        proxy_pass http://service3:3000/api/config;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}